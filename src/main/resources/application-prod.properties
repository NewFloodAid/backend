spring.application.name=flood-aid

# ==========================================
# Database — Render PostgreSQL
# ==========================================
# Render auto-provides DATABASE_URL for linked databases.
# The DatabaseUrlPostProcessor converts postgres:// to jdbc:postgresql://
# SPRING_DATASOURCE_URL can override if set manually.
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/onspot_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# Hibernate / JPA
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=false
# Keep open-in-view enabled — entities are serialized directly in controllers
spring.jpa.open-in-view=true

# ==========================================
# Connection Pool — optimized for free tier (512MB RAM)
# ==========================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ==========================================
# Tomcat — optimized for free tier
# ==========================================
server.tomcat.max-threads=10
server.tomcat.relaxed-query-chars=|,{,},[,]


# ==========================================
# Cloudinary settings
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Max file size.
spring.servlet.multipart.max-file-size=20MB
# Max request size.
spring.servlet.multipart.max-request-size=30MB

# ==========================================
# Auth / JWT
# ==========================================
line.channel.id=${LINE_CHANNEL_ID}
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ==========================================
# OpenStreetMap static render settings
# ==========================================
osm.static.zoom=18
osm.static.width=1024
osm.static.height=768
osm.static.tile.url.template=https://tile.openstreetmap.org/%d/%d/%d.png
osm.static.user-agent=FloodAid/1.0 (+https://openstreetmap.org)

# ==========================================
# Server port (Render uses PORT env var)
# ==========================================
server.port=${PORT:8080}